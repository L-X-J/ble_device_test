name: ble_device_test
description: "一个Ble 设备调试工具"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # BLE functionality
  flutter_blue_plus: ^2.2.1
  
  # State management
  provider: ^6.1.5+1
  
  # JSON serialization
  json_annotation: ^4.11.0
  
  # Shared preferences for local storage
  shared_preferences: ^2.5.4
  
  # File handling for import/export
  path_provider: ^2.1.5
  
  # File picker for import
  file_picker: ^10.3.10
  
  # Toast notifications
  fluttertoast: ^9.0.0
  
  # UUID generation
  uuid: ^4.5.3
  
  # Permission handling
  permission_handler: ^12.0.1
  
  # Device info for Android version detection
  device_info_plus: ^12.3.0

  # 分享文件
  share_plus: ^12.0.1
  
  # HTTP请求
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  json_serializable: ^6.13.1

flutter:
  uses-material-design: true